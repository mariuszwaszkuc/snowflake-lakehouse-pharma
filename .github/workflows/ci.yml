name: dbt CI

on:
  pull_request:
    branches: [ main ]

jobs:
  dbt-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dbt
        run: |
          pip install dbt-core dbt-snowflake

      - name: Setup profiles
        run: |
          mkdir -p ~/.dbt
          echo "${{ secrets.DBT_PROFILES }}" > ~/.dbt/profiles.yml
      
      - name: Setup profiles
        run: cat ~/.dbt/profiles.yml
         
      - name: dbt deps
        run: dbt deps
        working-directory: dbt_lakehouse_pharma

      - name: dbt build (DEV)
        run: dbt build --target dev
        working-directory: dbt_lakehouse_pharma
