name: dbt CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  dbt-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dbt + Snowflake adapter
        run: |
          pip install --upgrade pip
          pip install dbt-core dbt-snowflake snowflake-connector-python

      - name: Setup dbt profiles (SAFE - no EOF issues)
        run: |
          mkdir -p ~/.dbt

          printf "dbt_dev_lakehouse_pharma:\n  target: dev\n  outputs:\n    dev:\n      type: snowflake\n      account: %s\n      user: %s\n      password: %s\n      role: ACCOUNTADMIN\n      warehouse: COMPUTE_WH\n      database: DEV_LAKEHOUSE\n      schema: BRONZE\n      threads: 8\n" \
          "$SNOWFLAKE_ACCOUNT" \
          "$SNOWFLAKE_USER" \
          "$SNOWFLAKE_PASSWORD" > ~/.dbt/profiles.yml

        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}

      - name: Debug profiles.yml
        run: cat ~/.dbt/profiles.yml

      - name: dbt debug
        working-directory: dbt_lakehouse_pharma
        run: dbt debug --target dev

      - name: dbt deps
        working-directory: dbt_lakehouse_pharma
        run: dbt deps

      - name: dbt build (DEV)
        working-directory: dbt_lakehouse_pharma
        run: dbt build --target dev
