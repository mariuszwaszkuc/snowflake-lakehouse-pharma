name: dbt CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  dbt-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dbt + Snowflake adapter
        run: |
          pip install --upgrade pip
          pip install dbt-core dbt-snowflake snowflake-connector-python

      # 🔥 ZERO EOF - BUILD FILE LINE BY LINE
      - name: Create dbt profiles safely
        run: |
          mkdir -p dbt_lakehouse_pharma

          echo "dbt_dev_lakehouse_pharma:" > dbt_lakehouse_pharma/profiles.yml
          echo "  target: dev" >> dbt_lakehouse_pharma/profiles.yml
          echo "  outputs:" >> dbt_lakehouse_pharma/profiles.yml
          echo "    dev:" >> dbt_lakehouse_pharma/profiles.yml
          echo "      type: snowflake" >> dbt_lakehouse_pharma/profiles.yml
          echo "      account: \"${SNOWFLAKE_ACCOUNT}\"" >> dbt_lakehouse_pharma/profiles.yml
          echo "      user: \"${SNOWFLAKE_USER}\"" >> dbt_lakehouse_pharma/profiles.yml
          echo "      password: \"${SNOWFLAKE_PASSWORD}\"" >> dbt_lakehouse_pharma/profiles.yml
          echo "      role: ACCOUNTADMIN" >> dbt_lakehouse_pharma/profiles.yml
          echo "      warehouse: COMPUTE_WH" >> dbt_lakehouse_pharma/profiles.yml
          echo "      database: DEV_LAKEHOUSE" >> dbt_lakehouse_pharma/profiles.yml
          echo "      schema: BRONZE" >> dbt_lakehouse_pharma/profiles.yml
          echo "      threads: 8" >> dbt_lakehouse_pharma/profiles.yml

        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}

      - name: Debug profiles.yml
        run: cat dbt_lakehouse_pharma/profiles.yml

      - name: dbt debug
        working-directory: dbt_lakehouse_pharma
        run: dbt debug --target dev --profiles-dir .

      - name: dbt deps
        working-directory: dbt_lakehouse_pharma
        run: dbt deps

      - name: dbt build
        working-directory: dbt_lakehouse_pharma
        run: dbt build --target dev --profiles-dir .
