name: dbt CI

on:
  pull_request:
    branches: [ main ]

jobs:
  dbt-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dbt
        run: pip install dbt-core dbt-snowflake

      - name: Setup profiles
        run: |
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          dbt_dev_lakehouse_pharma:
            target: dev
            outputs:
              dev:
                type: snowflake
                account: RSHCLBR-JX48711
                user: MARIUSZWASZKUC
                password: "${SNOWFLAKE_PASSWORD}"
                role: ACCOUNTADMIN
                warehouse: COMPUTE_WH
                database: DEV_LAKEHOUSE
                schema: BRONZE
                threads: 8
          EOF
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}


      - name: dbt deps
        run: dbt deps
        working-directory: dbt_lakehouse_pharma

      - name: dbt build (DEV)
        run: dbt build --target dev
        working-directory: dbt_lakehouse_pharma
